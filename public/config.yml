backend:
  name: github
  repo: aman-katyal/IEEE-Website
  branch: main
  base_url: https://ieee-cms-auth.purdue-ieee.workers.dev

local_backend: false

# Global defaults
media_folder: "/public/images"
public_folder: "/images"

collections:
  - name: "committees"
    label: "Committees"
    folder: "src/data/content/committees"
    media_folder: "/public/images/committees/{{fields.id}}"
    public_folder: "/images/committees/{{fields.id}}"
    identifier_field: "id"
    create: true
    slug: "{{id}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "ID (URL Slug)", name: "id", widget: "string" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Short Name", name: "shortName", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Long Description", name: "longDescription", widget: "text" }
      - { label: "Status", name: "status", widget: "string" }
      - { label: "Status Color (Hex)", name: "statusColor", widget: "string" }
      - { label: "Status Background (RGBA)", name: "statusBg", widget: "string" }
      - { label: "Hero Image URL", name: "image", widget: "image" }
      
      - label: "Key Metrics (Stat Grid)"
        name: "metrics"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }

      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Chair Name", name: "chair", widget: "string" }
      - { label: "Contact Email", name: "email", widget: "string" }

      - label: "Join Button Configuration"
        name: "joinConfig"
        widget: "object"
        fields:
          - label: "Join Type"
            name: "type"
            widget: "select"
            options:
              - { label: "Default (/join page)", value: "default" }
              - { label: "Custom Link (Discord, External Form)", value: "link" }
              - { label: "Display Message (Not currently recruiting)", value: "message" }
            default: "default"
          - { label: "Button Text", name: "buttonText", widget: "string", default: "Join Us", required: false }
          - { label: "Custom URL", name: "url", widget: "string", required: false }
          - { label: "Custom Message (If 'message' selected)", name: "message", widget: "text", required: false }
      
      - label: "Dynamic Page Sections"
        name: "sections"
        widget: "list"
        types:
          - label: "Text Content"
            name: "text"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Content (Markdown)", name: "content", widget: "markdown" }
              - { label: "Section Image", name: "image", widget: "image", required: false }
              - { label: "Image Layout", name: "layout", widget: "select", options: ["top", "left", "right"], default: "top" }
              - { label: "Image Style", name: "imageStyle", widget: "object", fields: [{ label: "Crop Image (Fill)", name: "crop", widget: "boolean", default: true }, { label: "Image Size", name: "size", widget: "select", options: ["small", "medium", "large", "full"], default: "large" }] }
          
          - label: "Projects Grid"
            name: "projects"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string", default: "Active Projects" }
              - { label: "Image Style", name: "imageStyle", widget: "object", fields: [{ label: "Crop Project Images (Fill)", name: "crop", widget: "boolean", default: true }] }
              - { label: "Projects", name: "items", widget: "list", fields: [{ label: "Project Name", name: "name", widget: "string" }, { label: "Project Description", name: "description", widget: "text" }, { label: "Project Image", name: "image", widget: "image", required: false }] }

          - label: "Contact Card"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string", default: "Get in Touch" }
              - { label: "Contact Name", name: "name", widget: "string" }
              - { label: "Contact Role", name: "role", widget: "string", required: false }
              - { label: "Email Address", name: "email", widget: "string" }

          - label: "Image Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string", default: "Gallery" }
              - { label: "Images", name: "items", widget: "list", fields: [{ label: "Image", name: "src", widget: "image" }, { label: "Caption", name: "caption", widget: "string" }] }
          
          - label: "FAQ Accordion"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Section Title", name: "title", widget: "string", default: "FAQ" }
              - { label: "Questions", name: "items", widget: "list", fields: [{ label: "Question", name: "question", widget: "string" }, { label: "Answer", name: "answer", widget: "text" }] }

      - label: "Extra Custom Sections (Advanced)"
        name: "customSections"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Content", name: "content", widget: "text" }

      - { label: "Recruitment Info", name: "recruitmentInfo", widget: "text", required: false }
      - { label: "Meeting Schedule", name: "meetingSchedule", widget: "string", required: false }
      - label: "Social Links"
        name: "socialLinks"
        widget: "list"
        required: false
        fields:
          - { label: "Platform Name", name: "platform", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

  - name: "pages"
    label: "Site Data"
    files:
      - label: "Leadership"
        name: "leadership"
        file: "src/data/leadership.json"
        media_folder: "/public/images/officers"
        public_folder: "/images/officers"
        format: "json"
        fields:
          - label: "Officers"
            name: "leaders"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Committees", name: "committees", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Email", name: "email", widget: "string" }
      
      - label: "Cornerstone Committees"
        name: "cornerstone"
        file: "src/data/content/cornerstone.json"
        format: "json"
        fields:
          - label: "Groups"
            name: "groups"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Leads"
                name: "leads"
                widget: "list"
                fields:
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Email", name: "email", widget: "string" }
                  - { label: "Description", name: "description", widget: "text", required: false }
