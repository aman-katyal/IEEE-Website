<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager | Purdue IEEE</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
  <style>
    /* CMS UI Adjustments for the editor itself */
    #nc-root [class^="Pane2"] { background: #0f172a !important; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Register the Tailwind CSS for the preview iframe
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
    
    // Custom font for the preview
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

    const CommitteePreview = createClass({
      render: function() {
        const entry = this.props.entry;
        const name = entry.getIn(['data', 'name']);
        const tagline = entry.getIn(['data', 'tagline']);
        const description = entry.getIn(['data', 'description']);
        const longDescription = entry.getIn(['data', 'longDescription']);
        const image = this.props.getAsset(entry.getIn(['data', 'image']));

        return h('div', { 
          className: "p-8 bg-[#0f172a] min-h-screen text-white",
          style: { fontFamily: "'Inter', sans-serif" } 
        },
          h('div', { className: "max-w-4xl mx-auto space-y-12" },
            // Hero Section
            h('div', { className: "relative h-80 w-full rounded-3xl overflow-hidden bg-slate-800 shadow-2xl" },
              image ? h('img', { src: image.toString(), className: "w-full h-full object-cover" }) : null,
              h('div', { className: "absolute inset-0 bg-gradient-to-t from-[#0f172a] via-black/20 to-transparent flex flex-col justify-end p-10" },
                h('h1', { className: "text-5xl font-extrabold tracking-tight mb-2" }, name || "Committee Name"),
                h('p', { className: "text-xl text-blue-400 font-semibold tracking-wide" }, tagline || "Tagline goes here")
              )
            ),
            // Main Content
            h('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-12" },
              h('div', { className: "md:col-span-2 space-y-8" },
                h('div', { className: "space-y-4" },
                  h('h2', { className: "text-2xl font-bold text-white border-b border-slate-800 pb-2" }, "About the Committee"),
                  h('p', { className: "text-lg text-slate-300 leading-relaxed italic" }, description),
                  h('div', { className: "text-slate-400 leading-relaxed space-y-4" }, 
                    h('p', {}, longDescription)
                  )
                )
              ),
              // Sidebar Mockup
              h('div', { className: "space-y-6" },
                h('div', { className: "bg-slate-900/50 rounded-2xl p-6 border border-slate-800" },
                  h('h3', { className: "text-blue-400 font-bold uppercase text-sm mb-4 tracking-widest" }, "Quick Info"),
                  h('div', { className: "space-y-2 text-sm" },
                    h('p', { className: "text-slate-400" }, h('strong', { className: "text-white" }, "Status: "), "Active"),
                    h('p', { className: "text-slate-400" }, h('strong', { className: "text-white" }, "Chair: "), "Lead Name"),
                    h('p', { className: "text-slate-400" }, h('strong', { className: "text-white" }, "Contact: "), "email@purdue.edu")
                  )
                )
              )
            )
          )
        );
      }
    });

    CMS.registerPreviewTemplate("committees", CommitteePreview);
  </script>
</body>
</html>
